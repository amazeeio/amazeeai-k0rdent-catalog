k0rdentVersion: "1.9.0"

managementVersion: "1.9.0"

capiTemplate: "cluster-api-1-1-9"

providers:
  - name: cluster-api-provider-k0sproject-k0smotron
    template: cluster-api-provider-k0sproject-k0smotron-1-0-24
  - name: cluster-api-provider-aws
    template: cluster-api-provider-aws-1-0-20
  - name: projectsveltos
    template: projectsveltos-1-8-0

kcmValues:
  admissionWebhook:
    enabled: true
  cluster-api-operator:
    enabled: true
  controller:
    createAccessManagement: false
    createManagement: false
    createRelease: false
    logger:
      log-level: "error"
  velero:
    enabled: true
