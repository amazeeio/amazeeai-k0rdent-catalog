apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSCluster
metadata:
  name: {{ include "cluster.name" . }}
  annotations:
    aws.cluster.x-k8s.io/external-resource-gc: "true"
    {{- include "aws-standalone.keepPolicy" . | nindent 4 }}
  finalizers:
    - k0rdent.mirantis.com/cleanup
spec:
  region: {{ .Values.region | quote }}
  identityRef:
    kind: {{ .Values.clusterIdentity.kind | quote }}
    name: {{ .Values.clusterIdentity.name | quote }}
  controlPlaneLoadBalancer:
    healthCheckProtocol: TCP
    # --- START CUSTOMIZATION: Do not remove ---
    {{- if .Values.controlPlaneLoadBalancer.allowedCIDRs }}
    ingressRules:
      - description: "Restricted VPN Access to API Server"
        protocol: tcp
        fromPort: 6443
        toPort: 6443
        cidrBlocks:
          {{- range .Values.controlPlaneLoadBalancer.allowedCIDRs }}
          - {{ . | quote }}
          {{- end }}
    {{- end }}
    # --- END CUSTOMIZATION ---
  network:
    additionalControlPlaneIngressRules:
      - description: "k0s controller join API"
        protocol: tcp
        fromPort: 9443
        toPort: 9443
  {{- $sshKeyName := .Values.sshKeyName }}
  {{- if ne $sshKeyName nil }}
  sshKeyName: {{ $sshKeyName | quote }}
  {{- end }}
  {{- with .Values.bastion }}
  bastion:
    {{- toYaml . | nindent 4 }}
  {{- end }}
