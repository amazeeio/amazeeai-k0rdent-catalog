apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: {{ include "awsmachinetemplate.worker.name" . }}
  annotations:
    {{- include "aws-standalone.keepPolicy" . | nindent 4 }}
spec:
  template:
    spec:
      {{- $amiID := .Values.worker.amiID | default "" | trim }}
      {{- if $amiID }}
      ami:
        id: {{ $amiID | quote }}
      {{- else }}
      imageLookupFormat: {{ .Values.worker.imageLookup.format | quote }}
      imageLookupOrg: {{ .Values.worker.imageLookup.org | quote }}
      imageLookupBaseOS: {{ .Values.worker.imageLookup.baseOS | quote }}
      {{- end }}
      instanceType: {{ .Values.worker.instanceType }}
      # Instance Profile created by `clusterawsadm bootstrap iam create-cloudformation-stack`
      iamInstanceProfile: {{ .Values.worker.iamInstanceProfile | quote }}
      cloudInit:
        # Makes CAPA use k0s bootstrap cloud-init directly and not via SSM
        # Simplifies the VPC setup as we do not need custom SSM endpoints etc.
        insecureSkipSecretsManager: true
      publicIP: {{ .Values.publicIP }}
      rootVolume:
        size: {{ .Values.worker.rootVolumeSize }}
        # --- START CUSTOMIZATION: Do not remove ---
        encrypted: {{ .Values.worker.rootVolumeEncryption }}
        type: {{ .Values.worker.rootVolumeType }}
        # --- END CUSTOMIZATION ---
      {{- with .Values.worker.nonRootVolumes }}
      nonRootVolumes: {{- toYaml . | nindent 8 }}
      {{- end }}
      uncompressedUserData: {{ .Values.worker.uncompressedUserData }}
      # --- START CUSTOMIZATION: Do not remove ---
      instanceMetadataOptions:
        httpTokens: {{ .Values.worker.instanceMetadataOptions.httpTokens }}
        httpPutResponseHopLimit: {{ .Values.worker.instanceMetadataOptions.httpPutResponseHopLimit }}
      # --- END CUSTOMIZATION ---
