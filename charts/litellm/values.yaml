host: litellm.example.com

# Gateway API configuration (alternative to Ingress)
gateway:
  enabled: false # Default is still ingress
  name: default-gateway
  gatewayClassName: envoygateway
  replicas: 2  # Number of envoy proxy replicas (should match worker node count)

externalSecrets:
  enabled: false
  clusterSecretStore: external-secrets-keystore-secret-store

litellm-helm:
  enabled: true
  image:
    tag: "main-stable"
  .aws_api_key: &aws-api-key
    aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
    aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
    aws_region_name: os.environ/AWS_REGION

  db:
    useExisting: true
    deployStandalone: false
    database: litellm
    url: postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)?sslmode=require
    secret:
      name: litellm-external-secret
      usernameKey: databaseUsername
      passwordKey: databasePassword
      endpointKey: databaseHost

  # environmentSecrets:
  #   - litellm-external-secret
  # envVars:
  #     AWS_ACCESS_KEY_ID: fillme
  #     AWS_SECRET_ACCESS_KEY: fillme
  #     AWS_REGION: fillme
  #     UI_USERNAME: admin
  #     UI_PASSWORD: fillme

  proxy_config:

    litellm_settings:
      drop_params: true

    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY
      store_model_in_db: true
      store_prompts_in_spend_logs: false # This should only be true for specific debugging.

  livenessProbe:
    timeoutSeconds: 3
  readinessProbe:
    timeoutSeconds: 3
  startupProbe:
    timeoutSeconds: 3
    initialDelaySeconds: 5
