{{- if .Values.gateway.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: litellm-gateway-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: litellm-gateway-tls
  issuerRef:
    name: letsencrypt-prod
    kind: Issuer
  dnsNames:
  - {{ .Values.host }}
{{- end }}
